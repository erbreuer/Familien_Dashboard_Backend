openapi: 3.0.3
info:
  title: Familien-Dashboard API
  description: Backend API for the Familien-Dashboard application
  version: 1.0.0

servers:
  - url: http://localhost:5000
    description: Local development server
  - url: https://pi.erikbreuer.de
    description: Production server

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token_cookie

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: johndoe
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe
        is_active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time

    Family:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Mustermann Familie
        created_at:
          type: string
          format: date-time

    Role:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Familyadmin

    UserFamilyRole:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        family_id:
          type: integer
        role_id:
          type: integer
        role_name:
          type: string
          example: Familyadmin
        user_username:
          type: string
          example: johndoe

    Todo:
      type: object
      properties:
        id:
          type: integer
          example: 1
        family_id:
          type: integer
          example: 1
        title:
          type: string
          example: Einkaufen
        description:
          type: string
          nullable: true
          example: Milch und Brot
        is_completed:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Widget:
      type: object
      properties:
        id:
          type: integer
          example: 1
        family_id:
          type: integer
          example: 1
        widget_type_id:
          type: integer
          example: 1
        widget_key:
          type: string
          example: todo
        display_name:
          type: string
          example: Aufgaben
        description:
          type: string
          example: Gemeinsame Todo-Liste für die Familie
        is_enabled:
          type: boolean
          example: true
        grid_col:
          type: integer
          example: 2
        grid_row:
          type: integer
          example: 1
        grid_pos_x:
          type: integer
          example: 0
        grid_pos_y:
          type: integer
          example: 0
        can_edit:
          type: boolean
          example: true
          description: Gibt an ob der anfragende User dieses Widget bearbeiten darf

    WidgetUserPermission:
      type: object
      properties:
        id:
          type: integer
          example: 1
        family_widget_id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 2
        can_view:
          type: boolean
          example: true
        can_edit:
          type: boolean
          example: false

    WeatherLocation:
      type: object
      properties:
        id:
          type: integer
          example: 1
        family_id:
          type: integer
          example: 1
        city_name:
          type: string
          example: Berlin
        latitude:
          type: number
          format: float
          example: 52.52
        longitude:
          type: number
          format: float
          example: 13.405
        updated_at:
          type: string
          format: date-time

    WeatherCurrent:
      type: object
      properties:
        temperature:
          type: number
          format: float
          example: 18.5
        apparent_temperature:
          type: number
          format: float
          example: 16.2
        humidity:
          type: integer
          example: 65
        wind_speed:
          type: number
          format: float
          example: 12.3
        weather_code:
          type: integer
          example: 800
        weather_description:
          type: string
          example: Klarer Himmel
        icon:
          type: string
          example: 01d

    WeatherForecastDay:
      type: object
      properties:
        date:
          type: string
          format: date
          example: "2026-04-01"
        weather_code:
          type: integer
          example: 803
        weather_description:
          type: string
          example: Überwiegend bewölkt
        icon:
          type: string
          example: 04d
        temperature_max:
          type: number
          format: float
          example: 22.1
        temperature_min:
          type: number
          format: float
          example: 10.4

    WeatherResponse:
      type: object
      properties:
        location:
          $ref: "#/components/schemas/WeatherLocation"
        current:
          $ref: "#/components/schemas/WeatherCurrent"
        forecast:
          type: array
          items:
            $ref: "#/components/schemas/WeatherForecastDay"

    AuthResponse:
      type: object
      properties:
        message:
          type: string
          example: User registered successfully
        user:
          $ref: "#/components/schemas/User"

    AuthLoginResponse:
      type: object
      properties:
        message:
          type: string
          example: Login successful
        user:
          $ref: "#/components/schemas/User"
        families:
          type: array
          items:
            type: object
            properties:
              family_id:
                type: integer
                example: 1
              is_admin:
                type: boolean
                example: true

    Error:
      type: object
      properties:
        error:
          type: string
          example: Error message

    DeleteResponse:
      type: object
      properties:
        message:
          type: string

paths:
  /:
    get:
      summary: API status
      tags: [Health]
      responses:
        "200":
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Familien-Dashboard API aktiv

  /api/example/health:
    get:
      summary: Health check
      tags: [Health]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Familien-Dashboard API läuft einwandfrei!

  /api/users/register:
    post:
      summary: Register a new user
      description: JWT is set as an HttpOnly cookie in the response.
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, first_name, last_name]
              properties:
                username:
                  type: string
                  example: johndoe
                password:
                  type: string
                  format: password
                  example: secret123
                first_name:
                  type: string
                  example: John
                last_name:
                  type: string
                  example: Doe
      responses:
        "201":
          description: User registered successfully. JWT cookie is set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Missing fields or username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/users/login:
    post:
      summary: Log in with username and password
      description: JWT is set as an HttpOnly cookie in the response.
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: johndoe
                password:
                  type: string
                  format: password
                  example: secret123
      responses:
        "200":
          description: Login successful. JWT cookie is set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
        "400":
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Account is inactive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/users/profile:
    get:
      summary: Get the currently authenticated user's profile
      tags: [Users]
      security:
        - cookieAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/users/logout:
    post:
      summary: Logout — clears the JWT cookie
      tags: [Users]
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logout erfolgreich

  /api/families:
    get:
      summary: Get all families the authenticated user belongs to
      tags: [Families]
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of families with roles
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    family:
                      $ref: "#/components/schemas/Family"
                    role:
                      $ref: "#/components/schemas/Role"
                    user_family_role:
                      $ref: "#/components/schemas/UserFamilyRole"
        "400":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Create a new family
      description: The authenticated user is automatically assigned the Familyadmin role.
      tags: [Families]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: Mustermann Familie
      responses:
        "201":
          description: Family created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Family"
        "400":
          description: Missing name or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/{family_id}:
    get:
      summary: Get details of a specific family including its members
      description: Only accessible to members of the family.
      tags: [Families]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Family details with member list
          content:
            application/json:
              schema:
                type: object
                properties:
                  family:
                    $ref: "#/components/schemas/Family"
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserFamilyRole"
        "403":
          description: Access denied — not a member of this family
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Family not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Delete a family and all associated data
      description: Cascades deletion to all related widgets, todos, and user roles.
      tags: [Families]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Family deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Family not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/{family_id}/join:
    post:
      summary: Join an existing family
      description: >
        The authenticated user is added with the Guest role by default.
        Widget permissions are automatically created for all active widgets
        using each widget's default permissions.
      tags: [Families]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Joined family successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserFamilyRole"
        "400":
          description: User is already a member, or family/user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/{family_id}/widgets:
    get:
      summary: Get widgets visible to the authenticated user
      description: >
        Returns all active widgets for which the user has can_view=true.
        Includes can_edit so the frontend can show or hide edit controls.
        Accessible to all family members.
      tags: [Widgets]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of widgets with permissions for this user
          content:
            application/json:
              schema:
                type: object
                properties:
                  widgets:
                    type: array
                    items:
                      $ref: "#/components/schemas/Widget"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Activate a widget for the family
      description: >
        Requires Familyadmin role. Creates WidgetUserPermission entries for all
        current family members using the widget's default permissions.
      tags: [Widgets]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [widget_key]
              properties:
                widget_key:
                  type: string
                  example: todo
      responses:
        "201":
          description: Widget activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Widget"
        "400":
          description: Widget key not found or already active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not a family admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/{family_id}/widgets/{family_widget_id}:
    delete:
      summary: Deactivate a widget for the family
      description: Requires Familyadmin role. Cascades deletion of all user permissions.
      tags: [Widgets]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
        - name: family_widget_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Widget deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "403":
          description: Not a family admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Widget not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/{family_id}/widgets/{family_widget_id}/permissions/{user_id}:
    put:
      summary: Override widget permissions for a specific user
      description: >
        Requires Familyadmin role. Overwrites the user's can_view and can_edit
        for this widget. Widget default permissions are only applied on join/activate —
        this endpoint is the only way to change them afterwards.
      tags: [Widgets]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
        - name: family_widget_id
          in: path
          required: true
          schema:
            type: integer
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [can_view, can_edit]
              properties:
                can_view:
                  type: boolean
                  example: true
                can_edit:
                  type: boolean
                  example: true
      responses:
        "200":
          description: Permission updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WidgetUserPermission"
        "403":
          description: Not a family admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Widget or permission entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/{family_id}/widgets/{family_widget_id}/layout:
    put:
      summary: Update the grid layout of a widget
      description: Requires Familyadmin role.
      tags: [Widgets]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
        - name: family_widget_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                grid_col:
                  type: integer
                  example: 2
                grid_row:
                  type: integer
                  example: 1
                grid_pos_x:
                  type: integer
                  example: 0
                grid_pos_y:
                  type: integer
                  example: 0
      responses:
        "200":
          description: Layout updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Widget"
        "403":
          description: Not a family admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Widget not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/{family_id}/todos:
    get:
      summary: Get all todos for a family
      description: Requires can_view permission for the todo widget.
      tags: [Todos]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of todos
          content:
            application/json:
              schema:
                type: object
                properties:
                  todos:
                    type: array
                    items:
                      $ref: "#/components/schemas/Todo"
        "403":
          description: No permission or not a family member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Todo widget not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Create a new todo
      description: Requires can_edit permission for the todo widget.
      tags: [Todos]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  example: Einkaufen
                description:
                  type: string
                  nullable: true
                  example: Milch und Brot
      responses:
        "201":
          description: Todo created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Todo"
        "400":
          description: Missing title
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: No permission or not a family member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Todo widget not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/{family_id}/todos/{todo_id}:
    put:
      summary: Update a todo
      description: Requires can_edit permission for the todo widget.
      tags: [Todos]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
        - name: todo_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Einkaufen
                description:
                  type: string
                  nullable: true
                is_completed:
                  type: boolean
                  example: true
      responses:
        "200":
          description: Todo updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Todo"
        "403":
          description: No permission or not a family member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Todo not found or widget not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Delete a todo
      description: Requires can_edit permission for the todo widget.
      tags: [Todos]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
        - name: todo_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Todo deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "403":
          description: No permission or not a family member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Todo not found or widget not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/weather/{family_id}:
    get:
      summary: Get current weather and forecast for a family
      description: Returns weather data for the family's configured location. Every family member can call this endpoint.
      tags: [Weather]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Weather data with current conditions and 5-day forecast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not a member of this family
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Weather API unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/weather/{family_id}/location:
    get:
      summary: Get the configured weather location for a family
      description: Every family member can call this endpoint.
      tags: [Weather]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Current weather location configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  location:
                    $ref: "#/components/schemas/WeatherLocation"
        "403":
          description: Not a member of this family
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      summary: Update the weather location for a family
      description: Requires Familyadmin role. Geocodes the city name to get coordinates.
      tags: [Weather]
      security:
        - cookieAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [city]
              properties:
                city:
                  type: string
                  example: Mannheim
      responses:
        "200":
          description: Location updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Ort erfolgreich aktualisiert
                  location:
                    $ref: "#/components/schemas/WeatherLocation"
        "400":
          description: Missing city field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not a family admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Geocoding API unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
