openapi: 3.0.3
info:
  title: Familien-Dashboard API
  description: Backend API for the Familien-Dashboard application
  version: 1.0.0

servers:
  - url: http://localhost:5000
    description: Local development server
  - url: https://pi.erikbreuer.de
    description: Production server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    Family:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        created_at:
          type: string
          format: date-time

    Role:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: Familyadmin

    UserFamilyRole:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        family_id:
          type: integer
        role_id:
          type: integer
        role_name:
          type: string
        user_username:
          type: string

    Error:
      type: object
      properties:
        error:
          type: string

paths:
  /:
    get:
      summary: API status
      tags: [Health]
      responses:
        "200":
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Familien-Dashboard API aktiv

  /api/example/health:
    get:
      summary: Health check
      tags: [Health]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Familien-Dashboard API läuft einwandfrei!

  /api/users/register:
    post:
      summary: Register a new user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, first_name, last_name]
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
                first_name:
                  type: string
                last_name:
                  type: string
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User registered successfully
                  access_token:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          description: Missing fields or username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/users/login:
    post:
      summary: Log in with username and password
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Login successful
                  access_token:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Account is inactive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/users/profile:
    get:
      summary: Get the currently authenticated user's profile
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families:
    get:
      summary: Get all families the authenticated user belongs to
      tags: [Families]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of families with roles
          content:
            application/json:
              schema:
                type: object
                properties:
                  families:
                    type: array
                    items:
                      type: object
                      properties:
                        family:
                          $ref: "#/components/schemas/Family"
                        role:
                          $ref: "#/components/schemas/Role"
                        user_family_role:
                          $ref: "#/components/schemas/UserFamilyRole"
        "400":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Create a new family
      description: The authenticated user is automatically assigned the Familyadmin role.
      tags: [Families]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Family created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Family created successfully
                  family:
                    $ref: "#/components/schemas/Family"
        "400":
          description: Missing name or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/{family_id}:
    get:
      summary: Get details of a specific family including its members
      tags: [Families]
      security:
        - bearerAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Family details with member list
          content:
            application/json:
              schema:
                type: object
                properties:
                  family:
                    $ref: "#/components/schemas/Family"
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserFamilyRole"
        "404":
          description: Family not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Delete a family and all associated data
      description: Cascades deletion to all related widgets, todos, and user roles.
      tags: [Families]
      security:
        - bearerAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Family deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Family deleted successfully
        "404":
          description: Family not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/{family_id}/join:
    post:
      summary: Join an existing family
      description: The authenticated user is added with the Guest role by default.
      tags: [Families]
      security:
        - bearerAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Joined family successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Joined family successfully
                  user_family_role:
                    $ref: "#/components/schemas/UserFamilyRole"
        "400":
          description: User is already a member, or family/user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
