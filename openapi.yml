openapi: 3.0.3
info:
  title: Familien-Dashboard API
  description: Backend API for the Familien-Dashboard application
  version: 1.0.0

servers:
  - url: http://localhost:5000
    description: Local development server
  - url: https://pi.erikbreuer.de
    description: Production server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: johndoe
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe
        is_active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time

    Family:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Mustermann Familie
        created_at:
          type: string
          format: date-time

    Role:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Familyadmin

    UserFamilyRole:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        family_id:
          type: integer
        role_id:
          type: integer
        role_name:
          type: string
          example: Familyadmin
        user_username:
          type: string
          example: johndoe

    CalendarEvent:
      type: object
      properties:
        id:
          type: integer
          example: 1
        family_id:
          type: integer
          example: 1
        created_by:
          type: integer
          example: 1
        title:
          type: string
          example: Arzttermin
        description:
          type: string
          nullable: true
          example: Beim Hausarzt
        start_datetime:
          type: string
          format: date-time
          example: "2026-04-01T10:00:00"
        end_datetime:
          type: string
          format: date-time
          nullable: true
          example: "2026-04-01T11:00:00"
        is_all_day:
          type: boolean
          example: false
        is_public_to_family:
          type: boolean
          example: false
        color:
          type: string
          nullable: true
          example: "#FF5733"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    AuthLoginResponse:
      type: object
      properties:
        access_token:
          type: string
        user:
          $ref: "#/components/schemas/User"
        families:
          type: array
          items:
            type: object
            properties:
              family_id:
                type: integer
                example: 1
              is_admin:
                type: boolean
                example: true

    Error:
      type: object
      properties:
        error:
          type: string
          example: Error message

    DeleteResponse:
      type: object
      properties:
        message:
          type: string

paths:
  /:
    get:
      summary: API status
      tags: [Health]
      responses:
        "200":
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Familien-Dashboard API aktiv

  /api/example/health:
    get:
      summary: Health check
      tags: [Health]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Familien-Dashboard API läuft einwandfrei!

  /api/users/register:
    post:
      summary: Register a new user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, first_name, last_name]
              properties:
                username:
                  type: string
                  example: johndoe
                password:
                  type: string
                  format: password
                  example: secret123
                first_name:
                  type: string
                  example: John
                last_name:
                  type: string
                  example: Doe
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Missing fields or username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/users/login:
    post:
      summary: Log in with username and password
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: johndoe
                password:
                  type: string
                  format: password
                  example: secret123
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
        "400":
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Account is inactive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/users/profile:
    get:
      summary: Get the currently authenticated user's profile
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families:
    get:
      summary: Get all families the authenticated user belongs to
      tags: [Families]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of families with roles
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    family:
                      $ref: "#/components/schemas/Family"
                    role:
                      $ref: "#/components/schemas/Role"
                    user_family_role:
                      $ref: "#/components/schemas/UserFamilyRole"
        "400":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Create a new family
      description: The authenticated user is automatically assigned the Familyadmin role.
      tags: [Families]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: Mustermann Familie
      responses:
        "201":
          description: Family created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Family"
        "400":
          description: Missing name or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/{family_id}:
    get:
      summary: Get details of a specific family including its members
      description: Only accessible to members of the family.
      tags: [Families]
      security:
        - bearerAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Family details with member list
          content:
            application/json:
              schema:
                type: object
                properties:
                  family:
                    $ref: "#/components/schemas/Family"
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserFamilyRole"
        "403":
          description: Access denied — not a member of this family
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Family not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Delete a family and all associated data
      description: Cascades deletion to all related widgets, todos, and user roles.
      tags: [Families]
      security:
        - bearerAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Family deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Family not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/families/{family_id}/join:
    post:
      summary: Join an existing family
      description: The authenticated user is added with the Guest role by default.
      tags: [Families]
      security:
        - bearerAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Joined family successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserFamilyRole"
        "400":
          description: User is already a member, or family/user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/calendar/:
    post:
      summary: Create a new calendar event
      tags: [Calendar]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [family_id, title, start_datetime]
              properties:
                family_id:
                  type: integer
                  example: 1
                title:
                  type: string
                  example: Arzttermin
                start_datetime:
                  type: string
                  format: date-time
                  example: "2026-04-01T10:00:00"
                end_datetime:
                  type: string
                  format: date-time
                  nullable: true
                  example: "2026-04-01T11:00:00"
                description:
                  type: string
                  nullable: true
                  example: Beim Hausarzt
                is_all_day:
                  type: boolean
                  default: false
                is_public_to_family:
                  type: boolean
                  default: false
                color:
                  type: string
                  nullable: true
                  example: "#FF5733"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
        "400":
          description: Missing required fields or invalid datetime format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/calendar/family/{family_id}:
    get:
      summary: Get all visible calendar events for the current user in a family
      description: Returns events that are public to the family, created by the user, or explicitly shared with the user.
      tags: [Calendar]
      security:
        - bearerAuth: []
      parameters:
        - name: family_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of visible calendar events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/calendar/{event_id}:
    get:
      summary: Get a single calendar event by ID
      tags: [Calendar]
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Calendar event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
        "404":
          description: Event not found or access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      summary: Update a calendar event
      description: Only the creator of the event can update it.
      tags: [Calendar]
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                  nullable: true
                start_datetime:
                  type: string
                  format: date-time
                end_datetime:
                  type: string
                  format: date-time
                  nullable: true
                is_all_day:
                  type: boolean
                is_public_to_family:
                  type: boolean
                color:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
        "400":
          description: Not the creator or invalid data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Delete a calendar event
      description: Only the creator of the event can delete it.
      tags: [Calendar]
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "400":
          description: Not the creator or event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/calendar/{event_id}/visibility:
    put:
      summary: Set which users can see an event
      description: Only the creator can set visibility. Replaces the entire visibility list.
      tags: [Calendar]
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_ids]
              properties:
                user_ids:
                  type: array
                  items:
                    type: integer
                  example: [2, 3]
      responses:
        "200":
          description: Updated event with new visibility
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
        "400":
          description: Not the creator or missing user_ids
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
